<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hemenİndir.io | Medya Merkezi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --rgb-gradient: linear-gradient(90deg, #2f81f7, #00d2ff, #2f81f7); }
        body { font-family: 'Outfit', sans-serif; background-color: #05070a; color: #ffffff; }
        .rgb-text { background: var(--rgb-gradient); background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: shine 3s linear infinite; }
        .rgb-bg { background: var(--rgb-gradient); background-size: 200% auto; animation: shine 3s linear infinite; }
        @keyframes shine { to { background-position: 200% center; } }
        .glass-panel { background: rgba(13, 17, 23, 0.85); border: 1px solid rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); }
        .rgb-border:focus-within { border-image: var(--rgb-gradient) 1; box-shadow: 0 0 15px rgba(47, 129, 247, 0.4); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center px-4">

    <div class="absolute top-8 left-8 flex items-center gap-2">
        <div class="w-9 h-9 rounded-lg rgb-bg flex items-center justify-center font-bold text-white shadow-lg">Hİ</div>
        <span class="text-lg font-bold tracking-tight uppercase">HEMENİNDİR<span class="rgb-text">.io</span></span>
    </div>

    <main class="w-full max-w-4xl text-center">
        <div id="main-ui">
            <h1 class="text-5xl md:text-6xl font-extrabold mb-10 tracking-tight">Medyayı <span class="rgb-text">Analiz Et.</span></h1>
            
            <div class="glass-panel w-full max-w-2xl mx-auto rounded-[2.5rem] p-8 md:p-10 shadow-2xl">
                <form method="POST" action="/" onsubmit="showLoading()">
                    <input type="hidden" name="action" value="info">
                    <div class="bg-[#161b22] border border-[#30363d] rounded-xl flex items-center px-5 py-4 rgb-border mb-4">
                        <i class="fa-solid fa-link text-gray-500 mr-3"></i>
                        <input type="url" name="url" placeholder="Video bağlantısını yapıştır..." required class="bg-transparent w-full outline-none text-white">
                    </div>
                    <button type="submit" class="rgb-bg w-full py-4 font-bold text-white rounded-2xl hover:scale-[1.02] transition-all">VİDEOYU BUL</button>
                </form>
            </div>
        </div>

        {% if preview %}
        <div id="preview-card" class="mt-10 glass-panel w-full max-w-xl mx-auto rounded-3xl p-6 border border-blue-500/20">
            <img src="{{ preview.thumb }}" class="w-full h-48 object-cover rounded-2xl mb-4 border border-white/10 shadow-xl">
            <h3 class="text-lg font-bold mb-6 italic text-gray-200 line-clamp-2">{{ preview.title }}</h3>
            
            <div class="grid grid-cols-2 gap-4">
                <form method="POST" onsubmit="showLoading()">
                    <input type="hidden" name="url" value="{{ preview.url }}">
                    <input type="hidden" name="action" value="video">
                    <button class="w-full bg-gray-800 hover:bg-gray-700 py-3 rounded-xl font-bold flex items-center justify-center gap-2">
                        <i class="fa-solid fa-video"></i> MP4 İNDİR
                    </button>
                </form>
                <form method="POST" onsubmit="showLoading()">
                    <input type="hidden" name="url" value="{{ preview.url }}">
                    <input type="hidden" name="action" value="mp3">
                    <button class="w-full rgb-bg py-3 rounded-xl font-bold flex items-center justify-center gap-2">
                        <i class="fa-solid fa-music"></i> MP3 İNDİR
                    </button>
                </form>
            </div>
        </div>
        {% endif %}

        <div id="loading-bar" class="hidden mt-12 w-full max-w-md mx-auto">
            <div class="w-full bg-gray-900 rounded-full h-3 overflow-hidden p-[2px]">
                <div id="progress" class="rgb-bg h-full rounded-full w-0 transition-all duration-500"></div>
            </div>
            <p class="mt-4 rgb-text font-bold animate-pulse">İŞLEM YAPILIYOR, LÜTFEN BEKLEYİN...</p>
        </div>
    </main>

    <script>
        function showLoading() {
            document.getElementById('loading-bar').classList.remove('hidden');
            let w = 0;
            const iv = setInterval(() => {
                w += (95 - w) * 0.1;
                document.getElementById('progress').style.width = w + '%';
                if(w > 94) clearInterval(iv);
            }, 500);
        }
    </script>
</body>
</html>
