<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hemenİndir.io | Profesyonel Medya İndirici</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --rgb-gradient: linear-gradient(90deg, #2f81f7, #00d2ff, #2f81f7); }
        body { font-family: 'Outfit', sans-serif; background-color: #05070a; color: #ffffff; }
        .rgb-text { background: var(--rgb-gradient); background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: shine 3s linear infinite; }
        .rgb-bg { background: var(--rgb-gradient); background-size: 200% auto; animation: shine 3s linear infinite; }
        .rgb-border:focus-within { border-image: var(--rgb-gradient) 1; box-shadow: 0 0 15px rgba(47, 129, 247, 0.4); }
        @keyframes shine { to { background-position: 200% center; } }
        .glass-panel { background: rgba(13, 17, 23, 0.85); border: 1px solid rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center px-4 text-center">

    <div class="absolute top-8 left-8 flex items-center gap-2">
        <div class="w-9 h-9 rounded-lg rgb-bg flex items-center justify-center font-bold text-white text-sm">Hİ</div>
        <span class="text-lg font-bold tracking-tight uppercase">HEMENİNDİR<span class="rgb-text">.io</span></span>
    </div>

    <main class="w-full max-w-4xl">
        <h1 class="text-5xl md:text-7xl font-extrabold mb-4 tracking-tight">
            Her Şeyi <span class="rgb-text">Anında</span> İndir.
        </h1>
        <p class="text-gray-400 text-lg mb-12 font-light">
            TikTok, Instagram ve YouTube linkini yapıştır, saniyeler içinde cihazına gelsin.
        </p>

        <div class="glass-panel w-full max-w-2xl mx-auto rounded-[2.5rem] p-8 md:p-10 shadow-2xl">
            <form method="POST" action="/" class="flex flex-col md:flex-row gap-3">
                <div class="bg-[#161b22] border border-[#30363d] rounded-xl flex-grow flex items-center px-4 py-3 rgb-border">
                    <i class="fa-solid fa-link text-gray-400 mr-3"></i>
                    <input type="url" name="url" placeholder="Bağlantıyı buraya yapıştır..." required class="bg-transparent w-full outline-none text-white">
                </div>
                <button type="submit" class="rgb-bg px-10 py-3 font-bold text-white rounded-xl hover:scale-105 transition-all">
                    İndir
                </button>
            </form>
            
            {% if error %}
            <p class="mt-4 text-red-500 text-sm font-semibold">{{ error }}</p>
            {% endif %}
        </div>
        
        <div class="mt-8 text-xs text-gray-500 italic">
            Not: Büyük videolarda indirme butonuna bastıktan sonra işlemin bitmesi 5-10 saniye sürebilir.
        </div>
    </main>

    <footer class="mt-20 text-gray-600 text-[10px] font-bold uppercase tracking-[0.3em]">
        &copy; 2026 Hemenİndir.io — <span class="rgb-text">İlker Ortak</span>
    </footer>
</body>
</html>
