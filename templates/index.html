<!DOCTYPE html>
<html lang="tr">
{% if error_message %}
    <div class="bg-red-100 text-red-700 p-4 rounded-xl mb-4 text-sm">
        {{ error_message }}
    </div>
{% endif %}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Downloader | Hızlı ve Ücretsiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">

    <nav class="bg-white shadow-sm p-4 text-center">
        <h1 class="text-2xl font-bold text-indigo-600 tracking-tight">SaveFast</h1>
    </nav>

    <main class="flex-grow container mx-auto px-4 py-12 max-w-2xl">
        <div class="text-center mb-10">
            <h2 class="text-3xl md:text-4xl font-extrabold text-gray-900 mb-4">Video İndirmek Artık Çok Kolay</h2>
            <p class="text-gray-600">YouTube, Instagram ve daha fazlasından saniyeler içinde video çekin.</p>
        </div>

        <div class="bg-white rounded-2xl shadow-xl p-6 md:p-8">
            <form method="POST" class="space-y-4">
                <div class="relative">
                    <input 
                        type="text" 
                        name="url" 
                        placeholder="Video bağlantısını buraya yapıştırın..." 
                        class="w-full px-5 py-4 bg-gray-100 border-none rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none text-gray-700 text-lg transition-all"
                        required
                    >
                </div>
                <button 
                    type="submit" 
                    class="w-full gradient-bg text-white font-bold py-4 rounded-xl hover:opacity-90 transition-transform active:scale-95 shadow-lg"
                >
                    Link Oluştur
                </button>
            </form>

            {% if video_info %}
            <div class="mt-8 p-6 border-t border-gray-100 animate-fade-in">
                <div class="flex flex-col items-center text-center">
                    <div class="bg-indigo-100 p-4 rounded-full mb-4">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-indigo-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
