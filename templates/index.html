<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="monetag" content="69157789678a3b00e0483180d62331ea">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hemenİndir.io | Profesyonel Video İndirici</title>
    
    <script src="https://quge5.com/88/tag.min.js" data-zone="220292" async data-cfasync="false"></script>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; transition: all 0.4s ease; }
        .dark-mode { background-color: #000d1a; color: #ffffff; }
        .light-mode { background-color: #f0f7ff; color: #001a33; }
        
        .glass-card { 
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 2.5rem;
        }
        
        .light-mode .glass-card {
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(0, 26, 51, 0.1);
        }

        .input-glow:focus {
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.3);
            border-color: #3b82f6;
        }

        .btn-gradient {
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
            box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.4);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-up { animation: slideUp 0.6s ease-out forwards; }
    </style>
</head>
<body id="mainBody" class="min-h-screen flex flex-col dark-mode">

    <nav class="max-w-6xl mx-auto w-full p-6 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="w-12 h-12 btn-gradient rounded-2xl flex items-center justify-center font-extrabold text-white text-xl shadow-lg">Hİ</div>
            <div>
                <h1 class="text-2xl font-black tracking-tighter leading-none">HEMENİNDİR<span class="text-blue-500">.io</span></h1>
                <span class="text-[10px] font-bold text-blue-400 uppercase tracking-widest">Hızlı & Güvenli</span>
            </div>
        </div>
        <button onclick="toggleMode()" class="p-3 rounded-2xl bg-white/5 hover:bg-white/10 border border-white/10 transition-all">
            🌓
        </button>
    </nav>

    <main class="flex-grow container mx-auto px-4 py-12 max-w-4xl">
        
        <div class="mb-10 flex justify-center min-h-[90px] bg-white/5 rounded-3xl items-center border border-dashed border-white/10">
            <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">Sponsorlu Alan</p>
        </div>

        <div class="text-center space-y-4 mb-12 animate-up">
            <h2 class="text-5xl md:text-6xl font-extrabold tracking-tight">
                Her Şeyi <span class="text-blue-500 italic">Anında</span> İndir.
            </h2>
            <p class="text-gray-400 text-lg md:text-xl max-w-2xl mx-auto">
                TikTok, Instagram ve YouTube videolarını en yüksek kalitede cihazına kaydet.
            </p>
        </div>

        <div id="mainCard" class="glass-card p-2 md:p-3 shadow-2xl animate-up" style="animation-delay: 0.2s;">
            <div class="p-6 md:p-10 space-y-8">
                
                {% if error_message %}
                <div class="p-4 bg-red-500/10 border border-red-500/20 rounded-2xl text-red-400 text-sm text-center">
                    ⚠️ {{ error_message }}
                </div>
                {% endif %}

                <form method="POST" id="downloadForm" class="flex flex-col md:flex-row gap-4">
                    <input type="text" name="url" placeholder="Video linkini buraya yapıştır..." id="urlInput"
                        class="flex-grow px-8 py-5 bg-white/5 border-2 border-white/10 rounded-3xl focus:outline-none input-glow transition-all text-lg dark:text-white">
                    <button type="submit" id="submitBtn" class="btn-gradient px-12
