<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hemenİndir.io | TikTok Tarzı İndirici</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #0b0b0b; color: #fff; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .tiktok-card { max-width: 400px; width: 100%; margin-top: 2rem; border-radius: 2rem; overflow: hidden; animation: slideUp 0.5s ease; }
        .download-btn { background: #fe2c55; transition: 0.3s; } /* TikTok Kırmızısı */
        .download-btn:hover { background: #ef2950; transform: scale(1.02); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(50px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center px-4 py-12">

    <div class="mb-10 text-center">
        <h1 class="text-3xl font-extrabold tracking-tighter italic">HEMENİNDİR<span class="text-red-500">.io</span></h1>
    </div>

    <div class="glass w-full max-w-lg p-2 rounded-full flex items-center pr-2">
        <input type="url" name="url" id="urlInput" placeholder="Bağlantıyı buraya yapıştır..." 
            class="bg-transparent flex-grow py-3 px-6 outline-none text-white text-lg">
        <button onclick="document.getElementById('mainForm').submit()" class="download-btn px-6 py-3 rounded-full font-bold">
            <i class="fa-solid fa-arrow-down"></i>
        </button>
    </div>

    <form id="mainForm" method="POST" action="/" class="hidden">
        <input type="url" name="url" id="hiddenUrl">
    </form>
    <script>
        document.getElementById('urlInput').addEventListener('input', (e) => {
            document.getElementById('hiddenUrl').value = e.target.value;
        });
    </script>

    {% if video_info %}
    <div class="tiktok-card glass flex flex-col">
        <div class="relative aspect-[9/16] bg-black">
            <img src="{{ video_info.thumb }}" class="w-full h-full object-cover opacity-80">
            <div class="absolute inset-0 flex items-center justify-center">
                <i class="fa-solid fa-play text-6xl opacity-50"></i>
            </div>
        </div>
        
        <div class="p-6 text-center">
            <div class="flex items-center justify-center gap-2 mb-2">
                <span class="text-xs font-bold uppercase tracking-widest text-red-500">{{ video_info.platform }}</span>
            </div>
            <h2 class="text-lg font-semibold mb-6 line-clamp-2">{{ video_info.title }}</h2>
            
            <a href="/proxy_download?url={{ video_info.url | urlencode }}&title={{ video_info.title | urlencode }}" 
               class="download-btn w-full block py-4 rounded-xl font-extrabold text-lg shadow-lg">
               <i class="fa-solid fa-download mr-2"></i> VİDEOYU İNDİR
            </a>
        </div>
    </div>
    {% endif %}

    {% if error_message %}
    <div class="mt-8 text-red-500 font-medium bg-red-500/10 px-6 py-3 rounded-full border border-red-500/20">
        {{ error_message }}
    </div>
    {% endif %}

    <footer class="mt-auto pt-10 text-gray-500 text-xs">
        &copy; 2026 İlker Ortak — Sakarya Adapazarı 🚀
    </footer>

</body>
</html>
