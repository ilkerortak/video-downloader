<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hemenİndir.io | Hızlı Video İndirici</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; transition: all 0.4s ease; }
        .dark-mode { background-color: #000d1a; color: #ffffff; }
        .light-mode { background-color: #f0f7ff; color: #001a33; }
        
        .glass-card { 
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 2rem;
        }
        
        .light-mode .glass-card {
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(0, 26, 51, 0.1);
        }

        .btn-gradient {
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
            box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.4);
        }

        .input-style {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        .animate-up {
            animation: slideUp 0.6s ease-out forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body id="mainBody" class="min-h-screen flex flex-col dark-mode">

    <nav class="w-full p-6 flex justify-between items-center max-w-6xl mx-auto">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 btn-gradient rounded-xl flex items-center justify-center font-black text-white shadow-lg text-lg">Hİ</div>
            <h1 class="text-xl font-black tracking-tighter leading-none uppercase">HEMENİNDİR<span class="text-blue-500">.io</span></h1>
        </div>
        <button onclick="toggleMode()" class="p-3 rounded-xl bg-white/5 border border-white/10 hover:bg-white/10 transition-all">
            🌓
        </button>
    </nav>

    <main class="flex-grow container mx-auto px-4 py-12 max-w-4xl">
        
        <div class="text-center space-y-4 mb-12 animate-up">
            <h2 class="text-4xl md:text-6xl font-extrabold tracking-tight">Her Şeyi <span class="text-blue-500 italic">Anında</span> İndir.</h2>
            <p class="text-gray-400 text-sm md:text-lg max-w-xl mx-auto">Sadece linki yapıştır ve videonu saniyeler içinde cihazına kaydet.</p>
        </div>

        <div class="glass-card p-6 md:p-10 shadow-2xl animate-up">
            
            {% if error_message %}
            <div class="mb-6 p-4 bg-red-500/10 border border-red-500/20 rounded-xl text-red-400 text-sm text-center">
                {{ error_message }}
            </div>
            {% endif %}

            <form method="POST" id="downloadForm" class="flex flex-col md:flex-row gap-4">
                <input type="text" name="url" placeholder="Video linkini buraya yapıştır..." 
                    class="flex-grow px-6 py-5 input-style rounded-2xl focus:outline-none focus:border-blue-500 transition-all text-white text-lg">
                
                <button type="submit" id="submitBtn"
