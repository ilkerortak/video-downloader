<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaveFast | Video Downloader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); }
        .loader { border-top-color: #ffffff; animation: spinner 1s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .hidden { display: none; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">

    <nav class="bg-white shadow-sm p-4 text-center border-b border-gray-100">
        <h1 class="text-2xl font-bold text-indigo-600 tracking-tight">Domino's A.Ş'ye Hediyem'dir.</h1>
    </nav>

    <main class="flex-grow container mx-auto px-4 py-12 max-w-2xl">
        <div class="text-center mb-10">
            <h2 class="text-3xl font-extrabold text-gray-900 mb-2">Hızlı Video İndirici</h2>
            <p class="text-gray-500">TikTok, Instagram ve YouTube videolarını anında indirin.</p>
        </div>

        <div class="bg-white rounded-3xl shadow-2xl p-6 md:p-10 border border-gray-100">
            
            {% if error_message %}
            <div class="bg-red-50 border-l-4 border-red-500 text-red-700 p-4 rounded-lg mb-6 shadow-sm">
                {{ error_message }}
            </div>
            {% endif %}

            <form method="POST" id="downloadForm" class="space-y-6">
                <input 
                    type="text" name="url" placeholder="Video linkini buraya yapıştırın..." 
                    class="w-full px-6 py-4 bg-gray-50 border-2 border-gray-100 rounded-2xl focus:border-indigo-500 focus:ring-0 outline-none text-gray-700 text-lg transition-all"
                    required
                >

                <button 
                    type="submit" id="submitBtn"
                    class="w-full gradient-bg text-white font-bold py-5 rounded-2xl hover:scale-[1.02] transition-all active:scale-95 shadow-xl flex justify-center items-center text-lg"
                >
                    <span id="btnText">Medya'yı İndir</span>
                    <div id="loaderIcon" class="hidden loader ease-linear rounded-full border-4 border-t-4 border-white/20 h-6 w-6 ml-3"></div>
                </button>
            </form>
