
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaveFast | Video Downloader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body style="background-color: #003366; font-family: 'Inter', sans-serif;" class="min-h-screen flex flex-col text-white">

    <nav style="background-color: #002244;" class="shadow-lg p-4 text-center border-b border-blue-900">
        <h1 class="text-2xl font-bold text-blue-400 tracking-tight">Domino's A.Ş'ye Hediye <3</h1>
    </nav>

    <main class="flex-grow container mx-auto px-4 py-12 max-w-2xl">
        <div class="text-center mb-10">
            <h2 class="text-3xl font-extrabold text-white mb-2">Hızlı Video İndirici</h2>
            <p class="text-blue-200">TikTok, Instagram ve YouTube videolarını anında indirin.</p>
        </div>

        <div style="background-color: #002b55;" class="rounded-3xl shadow-2xl p-6 md:p-10 border border-blue-800">
            
            {% if error_message %}
            <div class="bg-red-900/50 border-l-4 border-red-500 text-red-200 p-4 rounded-lg mb-6 shadow-sm text-sm">
                {{ error_message }}
            </div>
            {% endif %}

            <form method="POST" id="downloadForm" class="space-y-6">
                <input 
                    type="text" name="url" placeholder="Video linkini buraya yapıştırın..." 
                    style="background-color: #003d7a;"
                    class="w-full px-6 py-4 border-2 border-transparent rounded-2xl focus:border-blue-400 outline-none text-white text-lg transition-all placeholder-blue-300"
                    required
                >

                <button 
                    type="submit" id="submitBtn"
                    style="background: linear-gradient(135deg, #1e40af 0%, #1e3a8a 100%);"
                    class="w-full text-white font-bold py-5 rounded-2xl hover:scale-[1.02] transition-all active:scale-95 shadow-xl flex justify-center items-center text-lg border border-blue-700"
                >
                    <span id="btnText">Video'yu İndir</span>
                    <div id="loaderIcon" class="hidden border-t-transparent border-solid animate-spin rounded-full border-white border-4 h-6 w-6 ml-3"></div>
                </button>
            </form>

            {% if video_info %}
            <div style="background-color: #003d7a;" class="mt-10 p-8 rounded-3xl border border-blue-700 text-center animate-fade-in">
                <h3 class="text-lg font-bold text-white mb-6 leading-tight">{{ video_info.title }}</h3>
                <a 
                    href="{{ video_info.url }}" 
                    target="_blank"
                    rel="noopener noreferrer"
                    class="inline-block w-full sm:w-auto bg-green-600 hover:bg-green-700 text-white font-extrabold py-4 px-12 rounded-2xl transition-all shadow-lg active:scale-95 text-lg"
                >
                    Hemen İndir
                </a>
            </div>
            {% endif %}
        </div>
    </main>

    <script>
        document.getElementById('downloadForm').onsubmit = function() {
            document.getElementById('btnText').innerText = "Hazırlanıyor...";
            document.getElementById('loaderIcon').classList.remove('hidden');
            document.getElementById('submitBtn').classList.add('opacity-80', 'cursor-not-allowed');
        };
    </script>
</body>
</html>
